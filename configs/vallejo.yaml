brand: Vallejo
adapter: generic
render_zoom: 2.5
min_saturation: 16
max_background_luma: 246
min_color_variance: 1.5
max_aspect_ratio_delta: 0.75
label_search_px: 260
text_reject_padding_px: 4
lines:
  - name: Mecha Color
    keywords:
      - Mecha Color
    sku_regex: "\\b69\\.0(?:0[1-9]|1[0-9]|2[0-9]|3[0-9]|4[0-2])\\b"
    finish: ""
    paint_type: acrylic
    min_container_width: 18
    min_container_height: 18
    max_container_width: 220
    max_container_height: 220
    crop_padding: 3
